{% extends "base.html" %}
{% block content %}
<h2>Manager Review</h2>
<table border="1">
<tr><th>ID</th><th>Dates</th><th>Type</th><th>Status</th><th>Action</th></tr>
{% for r in requests %}
<tr>
<td>{{ r.id }}</td>
<td>{{ r.start_date }} to {{ r.end_date }}</td>
<td>{{ r.leave_type }}</td>
<td>{{ r.status }}</td>
<td>
{% if r.status == 'Pending' %}
<form method="POST">
<input type="hidden" name="id" value="{{ r.id }}">
<button name="action" value="approve">Approve</button>
<button name="action" value="reject">Reject</button>
</form>
{% endif %}
</td>
</tr>
{% endfor %}
</table>
{% endblock %}
